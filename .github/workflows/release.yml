name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches info.json version
        run: |
          VERSION=$(python3 -c 'import json; print(json.load(open("info.json"))["version"])')
          if [ "v${VERSION}" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match info.json version v${VERSION}" >&2
            exit 1
          fi
      - name: Smoke test (builds dist/*.zip)
        run: ./tests/smoke.sh
      - name: Create GitHub release with portal zip
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true
